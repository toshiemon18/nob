[settings]
idiomatic_version_file_enable_tools = ["ruby"]
task_output = "interleave"

[tools]
gh = "latest"
"github:fables-tales/rubyfmt" = "latest"

[tasks.test]
description = "Run RSpec"
run = "bundle exec rspec"

[tasks.lint]
description = "Run rubyfmt"
run = "rubyfmt -o ./"

[tasks.fix]
description = "Auto formtting with rubyfmt"
run = "rubyfmt -i ./"
